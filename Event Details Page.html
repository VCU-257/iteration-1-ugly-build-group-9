<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details Page</title>
    <style>
        .carousel-item { min-height: 300px; background: #dee2e6; }
        .event-label {font-weight: bold;}
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    
    <div class = "eventDetailsCarousel"> 
        <div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="..." class="d-block w-100" alt="...">
                </div>

                <div class="carousel-item">
                    <img src="..." class="d-block w-100" alt="...">
                </div>

                <div class="carousel-item">
                    <img src="..." class="d-block w-100" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </div>

    <div class = "row">
        <div class = "col-sm-8">
            <div class="h-100 p-5 bg-body-tertiary border rounded-3"> 
                <h2>Event Name: Untitled Event #1</h2> 
                <p class = "event-label">Location:</p> <p>123 West Main Street</p>
            </div>
        </div>
        <div class = "col-sm-4">
            <div class="h-100 p-5 bg-body-tertiary border rounded-3">
                <p>Hello World</p>
            </div> 
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmWXAZUBSU/bIBzf/N1OZ3J1PCC" crossorigin="anonymous"></script>
</body>
</html>
