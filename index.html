<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      /* Mobile-only: restrict layout to max 430px */
      body {
        max-width: 430px;
        margin: 0 auto;
        background: #f0f0f0;
      }

      /* Restrict mobile menu height */
      .navbar-collapse {
        max-height: 450px;
        overflow-y: auto;
      }

      .square-tile {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: 12px;
      }

      img {
        background-color: rgb(84, 172, 199);
      }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">

        <a class="navbar-brand" href="#">AppName</a>

        <!-- Hamburger Button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">

          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="#">Profile</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Community</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Map</a></li>
            <li class="nav-item"><a class="nav-link" href="event-list.html">Event</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Support</a></li>
          </ul>

          <!-- Profile Dropdown -->
          <ul class="navbar-nav">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                User
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">View Profile</a></li>
                <li><a class="dropdown-item" href="#">Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Logout</a></li>
              </ul>
            </li>
          </ul>

        </div>
      </div>
    </nav>

    <!-- DASHBOARD -->
    <div class="container mt-3">

        <div class="mb-3 p-3 bg-light rounded">
            <div class="d-flex align-items-center">
                <img src="images\Placeholder Picture 1.png" class="square-tile" style="width: 40%;">
                <div class="ms-3">
                    <h6 class="mb-1">Announcement Title</h6>
                    <p class="mb-1 small text-muted">
                        Announcement Desc.
                    </p>
                    <p class="mb-0 small text-muted">
                        Additional details
                    </p>
                </div>
            </div>
        </div>

        <div class="row text-center">

            <div class="col-6 tile-container">
                <a href="placeholder1.html" class="text-decoration-none text-dark">
                    <img src="dashboard-icons/profile-icon.svg" class="square-tile">
                    <div class="mt-2">Profile</div>
                </a>
            </div>

            <div class="col-6 tile-container">
                <a href="placeholder2.html" class="text-decoration-none text-dark">
                    <img src="dashboard-icons/community-icon.svg" class="square-tile">
                    <div class="mt-2">Communities</div>
                </a>
            </div>

            <div class="col-6 tile-container">
                <a href="placeholder3.html" class="text-decoration-none text-dark">
                    <img src="dashboard-icons/map-icon.svg" class="square-tile">
                    <div class="mt-2">Map</div>
                </a>
            </div>

            <div class="col-6 tile-container">
                <a href="event-list.html" class="text-decoration-none text-dark">
                    <img src="dashboard-icons/event-icon.svg" class="square-tile">
                    <div class="mt-2">Events</div>
                </a>
            </div>

            <div class="col-6 tile-container">
                <a href="placeholder5.html" class="text-decoration-none text-dark">
                    <img src="dashboard-icons/support-icon.svg" class="square-tile">
                    <div class="mt-2">Support</div>
                </a>
            </div>

            <div class="col-6 tile-container">
                <a href="placeholder6.html" class="text-decoration-none text-dark">
                    <img src="dashboard-icons/placeholder-icon.svg" class="square-tile">
                    <div class="mt-2">TBD</div>
                </a>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
